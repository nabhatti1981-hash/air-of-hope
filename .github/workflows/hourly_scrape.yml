name: Hourly Lahore AQI Scrape

on:
  schedule:
    - cron: '0 * * * *' # Runs every hour
  workflow_dispatch: # Allows you to run it manually to test

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests pandas

      - name: Run Scraper
        run: python scraper.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "AQI-Bot"
          git config --global user.email "bot@github.com"
          git add lahore_hourly_log.csv
          # The '|| exit 0' prevents the action from failing if there are no data changes
          git commit -m "Update hourly AQI data" || exit 0
          git push
